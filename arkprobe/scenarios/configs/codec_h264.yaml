# x264 Video Encoding Workload Configuration
# H.264/AVC encoding representative of high-throughput video transcoding pipelines.

scenario:
  name: "x264 Video Encoding (H.264/AVC)"
  type: codec_video
  description: |
    FFmpeg encoding a video source using the libx264 encoder (H.264/AVC). This represents
    the most widely deployed video codec, used in streaming services, video conferencing,
    and media processing pipelines. The x264 encoder is highly optimized with extensive
    NEON/SVE SIMD assembly for motion estimation, DCT transforms, quantization, and loop
    filtering.

    From a hardware perspective, x264 encoding is one of the most SIMD-intensive workloads.
    Motion estimation (the dominant cost at ~60% of encode time) performs sum-of-absolute-
    differences (SAD) and hadamard transforms using wide SIMD operations. The workload
    exhibits high IPC (2.5-4.0) when SIMD units are fully utilized, moderate L2 pressure
    from reference frame access patterns, and excellent multi-core scaling due to frame-level
    and slice-level parallelism. x264 is a premier benchmark for evaluating SIMD execution
    unit width, SIMD instruction throughput, and core-count scaling efficiency.

platform:
  kunpeng_model: "920"
  min_cores: 4
  recommended_cores: 64

workload:
  setup:
    - "test -f /opt/media/input_1080p.y4m || ffmpeg -f lavfi -i testsrc=duration=300:size=1920x1080:rate=30 -pix_fmt yuv420p /opt/media/input_1080p.y4m"
  command: >
    ffmpeg -y
    -i /opt/media/input_1080p.y4m
    -c:v libx264
    -preset medium
    -crf 23
    -threads {thread_count}
    -t {duration}
    -f null /dev/null
  teardown: []
  target_process: "ffmpeg"
  throughput_metric: "fps"
  throughput_regex: 'speed=\s*(\d+\.?\d*)x'

collection:
  perf_duration_sec: 60
  ebpf_duration_sec: 30
  warmup_sec: 10
  event_groups:
    - topdown_l1
    - instruction_mix
    - cache_l1
    - cache_l2_l3
    - branch_prediction
    - memory_access
    - simd_utilization
  ebpf_probes:
    - cache_stats

scalability:
  enabled: true
  core_counts: [1, 2, 4, 8, 16, 32, 48, 64]
  thread_counts: [1, 2, 4, 8, 16, 32, 48, 64]

focus_metrics:
  - name: "simd_utilization_pct"
    description: >
      Percentage of retired instructions that are SIMD (NEON/SVE) operations. x264's inner
      loops (SAD, hadamard, DCT, IDCT, quantization, deblocking) are almost entirely SIMD.
      Utilization above 40% is typical for medium preset; values below 30% suggest the SIMD
      code paths are not being activated (wrong build flags or fallback to C paths). This is
      the single most important metric for evaluating codec performance on Kunpeng.
  - name: "ipc"
    description: >
      Instructions per cycle. x264 is one of the highest-IPC workloads, achieving 2.5-4.0
      when SIMD units are saturated. IPC directly correlates with encoding speed. Drops below
      2.0 indicate pipeline stalls from memory latency (reference frame fetches) or SIMD
      execution unit contention. Comparing IPC across presets (ultrafast vs. veryslow) reveals
      how well the microarchitecture handles different instruction mixes.
  - name: "l2_mpki"
    description: >
      L2 misses per thousand instructions. Motion estimation accesses reference frames with
      block-sized strides that can miss L1D but should hit L2 if the reference frame working
      set (current + nearby frames) fits. L2 MPKI above 8 indicates reference frames are
      spilling to L3, which is costly because motion estimation is latency-sensitive.
  - name: "core_scaling_efficiency"
    description: >
      Throughput ratio at N cores vs. 1 core, normalized. x264 scales well to 8-16 cores via
      slice-level parallelism but hits diminishing returns beyond that due to frame-level
      dependencies and synchronization overhead. This metric reveals the effective parallelism
      ceiling of the workload on the target microarchitecture.
  - name: "frontend_bound_pct"
    description: >
      Percentage of cycles where the frontend (fetch/decode) is the bottleneck. x264's SIMD
      inner loops can stress the instruction decoder with wide SIMD instructions. On
      architectures with limited SIMD decode throughput, the frontend becomes the bottleneck
      before the execution units are saturated.
