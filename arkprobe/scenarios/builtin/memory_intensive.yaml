# Memory Intensive Builtin Workload
# Streaming copy + random pointer chase — memory subsystem stress test.

scenario:
  name: "Memory Intensive (builtin)"
  type: memory_bound
  builtin: true
  description: |
    Two-phase memory workload: streaming memcpy of large buffers (bandwidth-bound)
    interleaved with random pointer-chase traversal (latency-bound). Stresses the
    entire memory hierarchy from L1D through DRAM. Useful for characterizing memory
    bandwidth saturation, cache miss rates, and NUMA effects on Kunpeng platforms.

dependencies: []

platform:
  kunpeng_model: "920"
  min_cores: 1
  recommended_cores: 16

workload:
  setup: []
  command: "{builtin_binary_memory} --threads {thread_count} --duration {duration}"
  teardown: []
  target_process: "arkprobe_memory"
  throughput_metric: "MB/s"
  throughput_regex: '(\d+\.?\d*)\s+MB/s'

collection:
  perf_duration_sec: 60
  ebpf_duration_sec: 0
  warmup_sec: 5
  event_groups:
    - topdown_l1
    - instruction_mix
    - cache_l1
    - cache_l2_l3
    - branch_prediction
    - memory_access
  ebpf_probes: []

scalability:
  enabled: true
  core_counts: [1, 2, 4, 8, 16]
  thread_counts: [1, 2, 4, 8, 16]

focus_metrics:
  - name: "l3_mpki"
    description: >
      L3 misses per thousand instructions. The streaming copy phase generates
      sequential access that hardware prefetchers can handle, but the pointer
      chase phase creates random accesses that miss L3 frequently. L3 MPKI
      above 10 indicates the workload is DRAM-bandwidth-bound.
  - name: "backend_bound_pct"
    description: >
      Backend stall ratio. Should be dominant (>50%) for this workload since
      most stalls come from waiting for memory. High backend-bound confirms
      the workload is memory-latency or bandwidth limited.
  - name: "memory_bandwidth_utilization_pct"
    description: >
      Fraction of theoretical peak memory bandwidth being utilized. Streaming
      copy should approach 60-80% of peak on Kunpeng 920 (8-channel DDR4).
      Low utilization suggests NUMA misplacement or prefetcher inefficiency.
