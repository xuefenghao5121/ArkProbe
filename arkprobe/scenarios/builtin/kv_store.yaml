# Key-Value Store Micro-Kernel (builtin)
# Simulates key characteristics of in-memory KV stores (Redis/Memcached style).

scenario:
  name: "Key-Value Store Micro-Kernel (builtin)"
  type: database_kv
  builtin: true
  description: |
    Key-Value store micro-kernel workload modeling Redis/Memcached patterns:
    - Hash table lookup: Random access with high collision rate
    - GET/SET operations: Mixed read/write with varying value sizes
    - LRU eviction simulation: Linked list traversal for cache policy
    - Expiration checking: Time-based key expiry scanning

    Produces random cache misses (hash lookups), mixed read/write patterns,
    pointer chasing (LRU list), and branch mispredictions.

dependencies: []

platform:
  kunpeng_model: "920"
  min_cores: 1
  recommended_cores: 8

workload:
  setup: []
  command: "{builtin_binary_kvstore} --threads {thread_count} --duration {duration} --keys 100000 --ratio 0.3"
  teardown: []
  target_process: "arkprobe_kvstore"
  throughput_metric: "OPS"
  throughput_regex: 'OPS:\s+(\d+\.?\d*)\s+ops/sec'

collection:
  perf_duration_sec: 60
  ebpf_duration_sec: 0
  warmup_sec: 5
  event_groups:
    - topdown_l1
    - instruction_mix
    - cache_l1
    - cache_l2_l3
    - memory_access
  ebpf_probes: []

scalability:
  enabled: true
  core_counts: [1, 2, 4, 8, 16]
  thread_counts: [1, 2, 4, 8, 16]

focus_metrics:
  - name: "l1d_mpki"
    description: >
      L1D misses per thousand instructions. Hash table lookups cause
      frequent L1D misses due to random access patterns.
  - name: "l3_mpki"
    description: >
      L3 misses per thousand instructions. KV stores with large key spaces
      show high L3 MPKI due to random access.
  - name: "tlb_mpki"
    description: >
      TLB misses per thousand instructions. Hash table and linked list
      traversals stress TLB with random memory access.
  - name: "branch_mpki"
    description: >
      Branch mispredictions per thousand instructions. Hash collisions
      and key comparisons cause branch mispredictions.
