scenario:
  name: JVM General
  type: jvm_general
  builtin: true
  description: >
    Generic JVM application profiling using JFR for GC/JIT/thread introspection.
    NOTE: This scenario requires a running JVM process. Use --jvm-pid to specify
    the target PID, or ensure java is running in the background. The workload
    command is intentionally empty — profiling targets an existing JVM process.

dependencies: []

platform:
  kunpeng_model: "920"
  min_cores: 4
  recommended_cores: 64

workload:
  # No workload command — this scenario profiles an already-running JVM process.
  # Pass --jvm-pid <pid> to specify the target JVM process.
  # Example: java -jar myapp.jar &  # start app in background
  #          arkprobe collect -b jvm --jvm-pid $(pgrep -f myapp.jar)
  command: ""
  target_process: "java"
  throughput_metric: "ops/sec"
  throughput_regex: '(\d+\.?\d*)\s+ops/sec'

collection:
  perf_duration_sec: 60
  warmup_sec: 10
  event_groups:
    - cpu_core
    - cpu_offcore
    - cache
    - dram
  jfr_enabled: true
  jfr_duration_sec: 60
  jfr_events:
    - gc
    - jit
    - thread

scalability:
  enabled: false

focus_metrics:
  - ipc
  - gc_pause_ratio
  - heap_usage_ratio
  - safepoint_ratio
