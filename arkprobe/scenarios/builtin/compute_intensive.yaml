# Compute Intensive Builtin Workload
# Dense matrix multiplication — pure compute bound, zero external dependencies.

scenario:
  name: "Compute Intensive (builtin)"
  type: compute_bound
  builtin: true
  description: |
    Dense double-precision matrix multiplication using ikj loop order.
    Pure compute-bound workload: high IPC, low cache miss rate, saturates
    ALU/FPU pipelines. Useful as a baseline for evaluating peak compute
    throughput and instruction-level parallelism on Kunpeng cores.

dependencies: []

platform:
  kunpeng_model: "920"
  min_cores: 1
  recommended_cores: 16

workload:
  setup: []
  command: "{builtin_binary_compute} --threads {thread_count} --duration {duration}"
  teardown: []
  target_process: "arkprobe_compute"
  throughput_metric: "Mflops"
  throughput_regex: '(\d+\.?\d*)\s+Mflops'

collection:
  perf_duration_sec: 60
  ebpf_duration_sec: 0
  warmup_sec: 5
  event_groups:
    - topdown_l1
    - instruction_mix
    - cache_l1
    - cache_l2_l3
    - branch_prediction
    - memory_access
  ebpf_probes: []

scalability:
  enabled: true
  core_counts: [1, 2, 4, 8, 16]
  thread_counts: [1, 2, 4, 8, 16]

focus_metrics:
  - name: "ipc"
    description: >
      Instructions per cycle. Compute-bound matrix multiplication should achieve
      high IPC (2.0-4.0) since the inner loop has excellent spatial locality and
      the instruction stream is predictable. IPC directly reflects ALU throughput.
  - name: "frontend_bound_pct"
    description: >
      Frontend stall ratio. Should be low (<10%) for this workload since the
      instruction stream is simple and repetitive. Elevated values indicate
      instruction cache or decode bottlenecks.
  - name: "retiring_pct"
    description: >
      Fraction of pipeline slots used for retiring instructions. Should be
      dominant (>50%) for a well-tuned compute workload. Low retiring indicates
      the core is underutilized.
